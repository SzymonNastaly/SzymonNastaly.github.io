[magic]
myebilanz=true
guid=!wurde automatisch erstellt

[general]
Transferdatenlieferant=!Max Mustermann;Bahnhofstraße;1;a;Gebäude 17;99999;Musterstadt;Deutschland;(099) 123465;mustermann@example.com
Nutzdatenlieferant=!Max Mustermann;Bahnhofstraße;1;a;Gebäude 17;99999;Musterstadt;Deutschland;(099) 123465;mustermann@example.com

[cert]
file=!D:\Gesamt\Pfad\zum\Zertifikat.pfx
pin=!PIN des Elsterzertifikats


[csv]
filename=!D:\Gesamt\Pfad\data.csv
delimiter=;
fieldKto=1
fieldValue=2
fieldName=3
fieldValueDebit=0
fieldValueCredit=0
fieldXBRL=0

[period]
balSheetClosingDate=!Stichdatum (YYYY-MM-DD)
fiscalYearBegin=!Stichdatum (YYYY-MM-DD)
fiscalYearEnd=!Stichdatum (YYYY-MM-DD)
balSheetClosingDatePreviousYear=nil

[report]
reportType=S
reportStatus=E
revisionStatus=E
reportElements=-GuV,-GuVMicroBilG,B,-SGE,-KS,-STU,-EB,-EV,-SGEP,-KKE,-BAL,-SA,-AV
statementType=EB
statementTypeTax=-GHB
incomeStatementendswithBalProfit=false
accountingStandard=HAOE
specialAccountingStandard=K
incomeStatementFormat=GKV
consolidationRange=EA
taxonomy=!6.3 (jeweils aktuelle Version eintragen, Stand 6. September. 2020: 6.3)
MicroBilG=!1 (KleinstkapitalgesellschaftenBilanzrechtsänderungsgesetz -> 1, wenn nicht dann nicht. Bei Einzelunternehmer z.B. die 0)

[company]
name=!Musterunternehmen UG (haftungsbeschränkt)
legalStatus=!GMBH
street=!Musterweg
houseNo=!10
zipCode=!99999
city=!Musterstadt
country=Deutschland
ST13=!13stellige „ELSTER-Steuernummer“(Kann aus der „Steuerbescheid-Steuernummer“ über „Extras – ELSTER-Steuernummer ermitteln“ berechnet werden)
BF4=!Bundesfinanzamtsnummer des Finanzamts(können Sie über „Extras – Komplette Finanzamtsliste anzeigen“ die Nummer mit Ihrem Finanzamt vergleichen)
incomeClassification=!trade (andere z.b: selfEmployment (selbständige arbeit), forestryAndAgriculture, other für z.B. steuerbefreite gemeinnützige Körperschaften)
business=!Geschäftsgegenstand

